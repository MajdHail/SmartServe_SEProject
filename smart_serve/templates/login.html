{% extends "base.html" %} {% block title %}– Login{% endblock %} {% block
content %}
<div class="login-wrap">
  <div class="login-card">
    <h1>Smart Serve</h1>
    <p class="subtitle">Restaurant Management System</p>
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input
          type="text"
          name="username"
          placeholder="e.g. waiter1"
          required
          autofocus
        />
      </div>
      <div class="field">
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="password"
          required
        />
      </div>
      <button type="submit" class="btn-primary full">Log In</button>
    </form>
    <div class="hint-box">
      <strong>Demo accounts:</strong>
      <div class="hint-row"><span class="hint-role">Waiter</span> <code>waiter1</code> / <code>pass123</code></div>
      <div class="hint-row"><span class="hint-role">Waiter</span> <code>waiter2</code> / <code>pass123</code></div>
      <div class="hint-row"><span class="hint-role">Chef</span> <code>chef</code> / <code>pass123</code></div>
      <div class="hint-row"><span class="hint-role">Manager</span> <code>manager</code> / <code>pass123</code></div>
    </div>
  </div>
</div>
{% endblock %}
