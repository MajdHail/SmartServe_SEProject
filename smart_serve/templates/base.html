<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Serve {% block title %}{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    {% if session.user %}
    <nav>
      <div class="nav-brand">Smart Serve</div>
      <div class="nav-links">
        {% if session.role == 'waiter' %}
        <a href="{{ url_for('floor_plan') }}">Floor Plan</a>
        {% elif session.role == 'chef' %}
        <a href="{{ url_for('chef_view') }}">Kitchen</a>
        {% elif session.role == 'manager' %}
        <a href="{{ url_for('manager_dashboard') }}">Dashboard</a>
        <a href="{{ url_for('manager_orders') }}">Orders</a>
        <a href="{{ url_for('manager_menu') }}">Menu</a>
        <a href="{{ url_for('manager_staff') }}">Staff</a>
        {% endif %}
        <span class="nav-user">{{ session.user }} ({{ session.role }})</span>
        <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
      </div>
    </nav>
    {% endif %}
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
